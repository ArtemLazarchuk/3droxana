<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Головна — Асистент</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"> <!-- Використовуємо той самий CSS для кольорів -->

  <style>
    /* --- РОЗБЛОКОВУЄМО ПРОКРУТКУ ДЛЯ ГОЛОВНОЇ СТОРІНКИ --- */
  body {
      overflow-y: auto !important;
      height: auto !important;
      min-height: 100vh;
  }
  
  /* Додаємо трохи вільного місця знизу, щоб аватар не прилипав до краю екрану */
  .hero-section {
      padding-bottom: 60px !important;
  }
  /* --- 1. Стилі для верхнього меню (Ефект матового скла БЕЗ різкої лінії) --- */
  .navbar.fixed-top {
      background: rgba(18, 18, 22, 0.4) !important; /* Ще більш прозорий фон */
      backdrop-filter: blur(16px); /* Сильніше розмиття заднього фону */
      -webkit-backdrop-filter: blur(16px); /* Для підтримки на iPhone/Mac */
      
      border-bottom: none !important; /* ПОВНІСТЮ ПРИБИРАЄМО РІЗКУ ЛІНІЮ */
      
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important; /* Дуже м'яка тінь для плавного переходу */
      z-index: 1030 !important; 
  }

  /* --- 2. Базові стилі (Комп'ютер) --- */
  .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: radial-gradient(circle at top right, #2a1a4a 0%, var(--bg-color, #121212) 60%);
      padding-top: 80px; 
      padding-bottom: 40px;
  }

  .hero-title {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
  }

  .hero-img {
      max-height: 75vh;
      filter: drop-shadow(0 0 30px rgba(138, 79, 255, 0.3));
  }

  /* --- 3. АДАПТАЦІЯ ДЛЯ ТЕЛЕФОНІВ --- */
  @media (max-width: 768px) {
      .hero-section {
          /* Примусово вимикаємо флекс і центрування, щоб текст не ліз під меню */
          display: block !important; 
          height: auto !important;
          /* Робимо ВЕЛИКИЙ відступ зверху, щоб точно перекрити висоту меню */
          padding-top: 120px !important; 
      }
      
      .hero-title {
          font-size: 2.2rem !important;
          margin-top: 0 !important;
          margin-bottom: 15px !important;
      }
      
      .hero-section .lead {
          font-size: 1rem;
          margin-bottom: 30px !important;
      }
      
      .hero-img {
          max-height: 40vh !important;
          width: auto;
          max-width: 100%;
          margin-top: 10px;
          object-fit: contain;
      }
  }
</style>
</head>
<body>

  <!-- Навігація -->
  <nav class="navbar navbar-expand-lg fixed-top px-4 py-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-white" href="#">KPI Assistant</a>
      <div class="ms-auto">
        <a href="/auth" class="btn btn-outline-light px-4 rounded-pill fw-bold">Увійти</a>
      </div>
    </div>
  </nav>

  <!-- Головний блок -->
  <main class="hero-section">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6 text-center text-lg-start">
          <h1 class="hero-title mb-3">Твій розумний<br>асистент у КПІ</h1>
          <p class="lead text-secondary mb-5">
             Допомога з розкладом, дедлайнами та пошуком інформації. 
             Просто запитай аватара.
          </p>
          <div class="d-flex flex-wrap gap-3 justify-content-center justify-content-lg-start">
            <a href="/auth" class="btn btn-lg btn-light rounded-pill px-4 px-lg-5">Почати</a>
            <a href="/sites" class="btn btn-lg btn-outline-secondary rounded-pill px-4 px-lg-5">Сайти</a>
          </div>
        </div>
        <div class="col-lg-6 text-center mt-5 mt-lg-0">
            <!-- Використовуємо картинку аватара -->
            <img src="/static/images/avatar.png" alt="3D Avatar" class="img-fluid hero-img">
        </div>
      </div>
    </div>
  </main>

</body>
</html>
