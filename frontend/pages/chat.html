<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат | KPI Assistant</title>
    <!-- ЗАХИСТ -->
    <script>
        (function() { if (!localStorage.getItem("user")) window.location.href = "/auth"; })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <!-- ?v= збільшуйте після змін у style.css, якщо браузер тримає старий кеш -->
    <link rel="stylesheet" href="/static/css/style.css?v=10">
</head>
<body data-theme="dark">

<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
            <span class="fw-bold">KPI Helper</span>
        </div>
    </div>
    <div class="px-3">
        <button id="new-chat-btn" class="btn btn-new-chat w-100 text-start btn-sm mb-3"><i class="bi bi-plus-lg me-2"></i> Новий чат</button>
        <div class="d-flex flex-column">
            <a href="/chat" class="nav-link-custom active"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
            <a href="/emotion-demo" class="nav-link-custom"><i class="bi bi-stars"></i> <span>Демо алгоритму</span></a>
        </div>
    </div>
    <div class="sidebar-footer mt-auto">
        <div class="sidebar-account-wrap" id="sidebar-account-wrap">
            <button
                type="button"
                class="sidebar-account-btn"
                id="sidebar-account-btn"
                aria-expanded="false"
                aria-haspopup="true"
                aria-controls="sidebar-account-dropdown"
            >
                <span class="sidebar-account-avatar-wrap">
                    <img
                        id="sidebar-user-photo"
                        class="sidebar-user-photo"
                        alt=""
                        width="40"
                        height="40"
                        hidden
                        decoding="async"
                        referrerpolicy="no-referrer"
                    >
                    <span id="sidebar-user-avatar" class="sidebar-user-avatar" aria-hidden="true">?</span>
                </span>
                <span class="sidebar-account-text">
                    <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                    <span class="sidebar-user-email" id="sidebar-user-email">—</span>
                </span>
                <i class="bi bi-chevron-up sidebar-account-chevron" aria-hidden="true"></i>
            </button>
            <div id="sidebar-account-dropdown" class="sidebar-account-dropdown" role="menu" hidden>
                <div class="sidebar-account-theme-slot" id="sidebar-theme-slot">
                    <button
                        type="button"
                        class="sidebar-account-main-row"
                        id="sidebar-theme-menu-trigger"
                        aria-expanded="false"
                        aria-haspopup="true"
                        aria-controls="sidebar-theme-flyout"
                    >
                        <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-circle-half"></i></span>
                        <span class="sidebar-account-main-label">Тема</span>
                        <i class="bi bi-chevron-right sidebar-account-main-chevron" aria-hidden="true"></i>
                    </button>
                    <div id="sidebar-theme-flyout" class="sidebar-account-theme-flyout" role="menu" hidden>
                        <div class="sidebar-account-dropdown-heading">Тема</div>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="light">
                            <i class="bi bi-sun-fill" aria-hidden="true"></i> Світла
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="dark">
                            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i> Темна
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="system">
                            <i class="bi bi-display" aria-hidden="true"></i> Як у системі
                        </button>
                    </div>
                </div>
                <button type="button" class="sidebar-account-main-row" id="sidebar-dropdown-logout" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-box-arrow-right"></i></span>
                    <span class="sidebar-account-main-label">Вийти</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<main class="chat-area" id="main-content">
    <header class="d-flex align-items-center p-3 border-bottom border-secondary" style="height: 60px; background-color: var(--sidebar-bg);">
        <button id="sidebar-toggle" class="btn text-secondary me-3"><i class="bi bi-layout-sidebar"></i></button>
        <span class="fw-bold">Чат з асистентом</span>
    </header>
    
    <div class="messages-container flex-grow-1" id="messages"></div>

    <div class="input-area">
        <div id="pending-file-bar" class="pending-file-bar" hidden>
            <span class="pending-file-bar-icon" aria-hidden="true"><i class="bi bi-paperclip"></i></span>
            <div class="pending-file-bar-main">
                <span class="pending-file-bar-label">Файл додано</span>
                <strong id="pending-file-name" class="pending-file-bar-name"></strong>
            </div>
            <button type="button" class="pending-file-remove" id="pending-file-remove" title="Прибрати файл" aria-label="Прибрати вкладення"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="position-relative d-flex gap-2 align-items-stretch">
            <input type="file" id="file-input" class="d-none" accept=".pdf,application/pdf,image/png,image/jpeg,image/jpg,image/webp,image/gif">
            <input type="text" class="form-control custom-input" id="user-input"
                data-placeholder-normal="Напишіть повідомлення…"
                data-placeholder-with-file="Промпт до файлу (необов’язково)…"
                placeholder="Напишіть повідомлення…" autocomplete="off" lang="uk">
            <button type="button" class="btn-attach" id="attach-btn" title="Додати PDF або зображення" aria-label="Вкладення"><i class="bi bi-paperclip"></i></button>
            <button type="button" class="btn-voice" id="voice-btn" title="Голос (браузер): клік — слухати, ще раз — зупинити й надіслати" aria-label="Голосове введення" aria-pressed="false"><i class="bi bi-mic-fill"></i></button>
            <button type="button" class="btn-send" id="send-btn" title="Надіслати" aria-label="Надіслати повідомлення"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</main>

<!-- d-lg-block: аватар лише при ширині вікна ≥992px; на вузькому екрані блок прихований -->
<div class="avatar-fixed d-none d-lg-block">
    <video id="avatar-video" autoplay muted loop playsinline><source src="/avatar/animations/muse.mp4" type="video/mp4"></video>
    <div class="emotion-label">Стан: <span id="emotion-status" class="emotion-value">Очікування</span></div>
    <div class="resize-handle"></div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-secondary"><h5>Вихід</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">Ви впевнені, що хочете вийти з акаунту?</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button type="button" class="btn btn-danger" id="confirmLogout">Вийти</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
<script src="/static/js/chat.js?v=12"></script>
</body>
</html>
