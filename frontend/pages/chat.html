<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат | KPI Assistant</title>
    <!-- ЗАХИСТ: Перевірка авторизації -->
    <script>
        (function() { if (!localStorage.getItem("user")) window.location.href = "/auth"; })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
    <!-- ?v= збільшуйте після змін у style.css, якщо браузер тримає старий кеш -->
    <link rel="stylesheet" href="/static/css/style.css?v=13">
</head>
<body data-theme="dark">

<!-- 1. САЙДБАР (УНІФІКОВАНИЙ) -->
<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
            <span class="fw-bold">KPI Assistant</span>
        </div>
    </div>
    <div class="px-3">
        <!-- Оновлена уніфікована кнопка Новий чат -->
        <button id="new-chat-btn" class="btn btn-new-chat w-100 mb-3">
            <i class="bi bi-plus-lg"></i> <span>Новий чат</span>
        </button>
        
        <div class="d-flex flex-column">
            <a href="/chat" class="nav-link-custom active"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>

    <!-- Блок профілю внизу сайдбару -->
    <div class="sidebar-footer mt-auto">
        <div class="sidebar-account-wrap" id="sidebar-account-wrap">
            <button type="button" class="sidebar-account-btn" id="sidebar-account-btn" aria-expanded="false" aria-haspopup="true">
                <span class="sidebar-account-avatar-wrap">
                    <img id="sidebar-user-photo" class="sidebar-user-photo" alt="" width="40" height="40" hidden>
                    <span id="sidebar-user-avatar" class="sidebar-user-avatar">?</span>
                </span>
                <span class="sidebar-account-text">
                    <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                    <span class="sidebar-user-email" id="sidebar-user-email">—</span>
                </span>
                <i class="bi bi-chevron-up sidebar-account-chevron"></i>
            </button>
            
            <!-- Випадаюче меню профілю -->
            <div id="sidebar-account-dropdown" class="sidebar-account-dropdown" hidden>
                <div class="sidebar-account-theme-slot" id="sidebar-theme-slot">
                    <button type="button" class="sidebar-account-main-row" id="sidebar-theme-menu-trigger">
                        <span class="sidebar-account-main-icon"><i class="bi bi-circle-half"></i></span>
                        <span class="sidebar-account-main-label">Тема</span>
                        <i class="bi bi-chevron-right sidebar-account-main-chevron"></i>
                    </button>
                    <div id="sidebar-theme-flyout" class="sidebar-account-theme-flyout" hidden>
                        <div class="sidebar-account-dropdown-heading">Тема</div>
                        <button type="button" class="sidebar-account-theme-btn" data-theme-pref="light"><i class="bi bi-sun-fill"></i> Світла</button>
                        <button type="button" class="sidebar-account-theme-btn" data-theme-pref="dark"><i class="bi bi-moon-stars-fill"></i> Темна</button>
                        <button type="button" class="sidebar-account-theme-btn" data-theme-pref="system"><i class="bi bi-display"></i> Системна</button>
                    </div>
                </div>
                <a href="/emotion-demo" class="sidebar-account-main-row" id="sidebar-link-emotion-demo" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-stars"></i></span>
                    <span class="sidebar-account-main-label">Демо емоцій</span>
                </a>
                <a href="/swagger" target="_blank" rel="noopener noreferrer" class="sidebar-account-main-row" id="sidebar-link-web-api" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-braces"></i></span>
                    <span class="sidebar-account-main-label">Відкрити Web API</span>
                </a>
                <button type="button" class="sidebar-account-main-row" id="sidebar-dropdown-logout" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-box-arrow-right"></i></span>
                    <span class="sidebar-account-main-label">Вийти</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- 2. ОСНОВНА ОБЛАСТЬ ЧАТУ -->
<main class="chat-area" id="main-content">
    <!-- Уніфікований хедер -->
    <header class="content-header">
    <button id="sidebar-toggle" class="btn text-secondary me-3"><i class="bi bi-layout-sidebar"></i></button>
    <span class="fw-bold header-title">Чат з асистентом</span>
</header>
    
    <!-- Контейнер повідомлень -->
    <div class="messages-container" id="messages"></div>

    <!-- Область введення -->
    <div class="input-area">
        <!-- Панель прикріпленого файлу -->
        <div id="pending-file-bar" class="pending-file-bar" hidden>
            <span class="pending-file-bar-icon"><i class="bi bi-paperclip"></i></span>
            <div class="pending-file-bar-main">
                <span class="pending-file-bar-label">Файл додано</span>
                <strong id="pending-file-name" class="pending-file-bar-name"></strong>
            </div>
            <button type="button" class="pending-file-remove" id="pending-file-remove"><i class="bi bi-x-lg"></i></button>
        </div>

        <div class="position-relative d-flex gap-2 align-items-stretch">
            <input type="file" id="file-input" class="d-none" accept=".pdf,image/*">
            <input type="text" class="form-control custom-input" id="user-input" 
                   placeholder="Напишіть повідомлення…" autocomplete="off" lang="uk">
            
            <button type="button" class="btn-attach" id="attach-btn" title="Додати файл"><i class="bi bi-paperclip"></i></button>
            <button type="button" class="btn-voice" id="voice-btn" title="Голосове введення"><i class="bi bi-mic-fill"></i></button>
            <button type="button" class="btn-send" id="send-btn" title="Надіслати"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</main>

<!-- 3. АВАТАР (ДЛЯ ВЕЛИКИХ ЕКРАНІВ) -->
<div class="avatar-fixed d-none d-lg-block">
    <div id="avatar-video-stack" class="avatar-video-stack">
        <video id="avatar-video-a" class="avatar-video-layer is-active" autoplay muted loop playsinline src="/avatar/animations/muse.mp4"></video>
        <video id="avatar-video-b" class="avatar-video-layer" muted loop playsinline></video>
    </div>
    <div class="emotion-label">Стан: <span id="emotion-status" class="emotion-value">Очікування</span></div>
    <div class="resize-handle"></div>
</div>

<!-- 4. МОДАЛЬНЕ ВІКНО ВИХОДУ -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
          <h5 class="fw-bold m-0">Вихід</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Ви впевнені, що хочете вийти з акаунту?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button type="button" class="btn btn-danger px-4" id="confirmLogout">Вийти</button>
      </div>
    </div>
  </div>
</div>

<!-- СКРИПТИ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
<script src="/static/js/chat.js?v=18"></script>
</body>
</html>
