<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історія | KPI Assistant</title>
    <script>
        (function() { if (!localStorage.getItem("user")) window.location.href = "/auth"; })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css?v=13">
    <style>
        body { display: flex; height: 100vh; background-color: var(--bg-color); margin: 0; }
        
        .history-content { 
            flex-grow: 1; 
            margin-left: var(--sidebar-width); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: margin-left 0.3s ease;
        }

        .history-list-scroll { 
            flex-grow: 1; 
            overflow-y: auto; 
            /* ВИПРАВЛЕНО: піднято заголовок (зменшено padding-top) */
            padding: 20px 40px 40px 40px; 
        }

        /* Стиль кнопок керування в картці */
        .chat-actions {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            transition: 0.2s;
            padding: 5px;
        }

        .action-btn:hover { color: var(--accent-color); transform: scale(1.1); }
        .btn-delete:hover { color: #ff5f5f; }

        @media (max-width: 768px) { .history-content { margin-left: 0; } }
    </style>
</head>
<body data-theme="dark">

<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
            <span class="fw-bold">KPI Helper</span>
        </div>
    </div>
    <div class="px-3">
        <!-- ВИПРАВЛЕНО: Кнопка тепер така сама, як у чаті -->
        <button id="new-chat-btn" class="btn btn-new-chat">+ Новий чат</button>
        
        <div class="d-flex flex-column">
            <a href="/chat" class="nav-link-custom"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom active"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>
    <div class="sidebar-footer mt-auto">
        <div class="sidebar-account-wrap" id="sidebar-account-wrap">
            <button
                type="button"
                class="sidebar-account-btn"
                id="sidebar-account-btn"
                aria-expanded="false"
                aria-haspopup="true"
                aria-controls="sidebar-account-dropdown"
            >
                <span class="sidebar-account-avatar-wrap">
                    <img
                        id="sidebar-user-photo"
                        class="sidebar-user-photo"
                        alt=""
                        width="40"
                        height="40"
                        hidden
                        decoding="async"
                        referrerpolicy="no-referrer"
                    >
                    <span id="sidebar-user-avatar" class="sidebar-user-avatar" aria-hidden="true">?</span>
                </span>
                <span class="sidebar-account-text">
                    <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                    <span class="sidebar-user-email" id="sidebar-user-email">—</span>
                </span>
                <i class="bi bi-chevron-up sidebar-account-chevron" aria-hidden="true"></i>
            </button>
            <div id="sidebar-account-dropdown" class="sidebar-account-dropdown" role="menu" hidden>
                <div class="sidebar-account-theme-slot" id="sidebar-theme-slot">
                    <button
                        type="button"
                        class="sidebar-account-main-row"
                        id="sidebar-theme-menu-trigger"
                        aria-expanded="false"
                        aria-haspopup="true"
                        aria-controls="sidebar-theme-flyout"
                    >
                        <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-circle-half"></i></span>
                        <span class="sidebar-account-main-label">Тема</span>
                        <i class="bi bi-chevron-right sidebar-account-main-chevron" aria-hidden="true"></i>
                    </button>
                    <div id="sidebar-theme-flyout" class="sidebar-account-theme-flyout" role="menu" hidden>
                        <div class="sidebar-account-dropdown-heading">Тема</div>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="light">
                            <i class="bi bi-sun-fill" aria-hidden="true"></i> Світла
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="dark">
                            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i> Темна
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="system">
                            <i class="bi bi-display" aria-hidden="true"></i> Як у системі
                        </button>
                    </div>
                </div>
                <a href="/emotion-demo" class="sidebar-account-main-row" id="sidebar-link-emotion-demo" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-stars"></i></span>
                    <span class="sidebar-account-main-label">Демо емоцій</span>
                </a>
                <a href="/swagger" target="_blank" rel="noopener noreferrer" class="sidebar-account-main-row" id="sidebar-link-web-api" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-braces"></i></span>
                    <span class="sidebar-account-main-label">Відкрити Web API</span>
                </a>
                <button type="button" class="sidebar-account-main-row" id="sidebar-dropdown-logout" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-box-arrow-right"></i></span>
                    <span class="sidebar-account-main-label">Вийти</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<main class="history-content" id="main-content">
    <header class="content-header">
        <button id="sidebar-toggle" class="btn text-secondary me-3"><i class="bi bi-layout-sidebar"></i></button>
    </header>

    <div class="history-list-scroll">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold m-0">Історія розмов</h1>
            <div class="text-secondary small" id="chatCount"></div>
        </div>

        <div id="historyContent">
            <div class="text-center mt-5"><div class="spinner-border text-primary"></div></div>
        </div>
        
        <div id="noChats" class="text-center text-secondary mt-5" style="display: none;">
            <i class="bi bi-chat-dots fs-1 d-block mb-3"></i> Порожньо
        </div>
    </div>
</main>

<!-- МОДАЛКА ПЕРЕЙМЕНУВАННЯ -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-secondary"><h5>Перейменувати чат</h5></div>
      <div class="modal-body">
          <input type="text" class="form-control custom-input" id="newChatName">
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button type="button" class="btn btn-primary" id="saveNameBtn" style="background-color: var(--accent-color); border:none;">Зберегти</button>
      </div>
    </div>
  </div>
</div>

<!-- МОДАЛКА ВИДАЛЕННЯ -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-secondary"><h5>Видалити розмову?</h5></div>
      <div class="modal-body">Цю дію неможливо буде скасувати.</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Ні</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Так, видалити</button>
      </div>
    </div>
  </div>
</div>

<!-- МОДАЛКА ВИХОДУ -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-secondary"><h5>Вихід</h5></div>
      <div class="modal-body">Бажаєте вийти з акаунту?</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Ні</button>
        <button type="button" class="btn btn-danger" id="confirmLogout">Вийти</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/chat.js?v=9"></script>
<script>
    let currentSessionId = null;

    function authHeaders(extra = {}) {
        const t = localStorage.getItem("access_token");
        const h = { ...extra };
        if (t) h.Authorization = "Bearer " + t;
        return h;
    }

    async function fetchHistory() {
        const container = document.getElementById('historyContent');
        try {
            const user = JSON.parse(localStorage.getItem("user"));
            const uid = user?._id?.$oid || user?._id || user?.id;
            const res = await fetch(`/api/sessions/user/${uid}`, { headers: authHeaders() });
            if (res.status === 401) {
                window.location.href = "/auth";
                return;
            }
            const data = await res.json();
            container.innerHTML = '';
            if (!Array.isArray(data) || !data.length) {
                document.getElementById('noChats').style.display = 'block';
                return;
            }
            document.getElementById('chatCount').textContent = `Діалогів: ${data.length}`;
            
            data.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).forEach(s => {
                const card = document.createElement('div');
                card.className = 'chat-card';
                const sid = s._id?.$oid || s._id;
                
                card.innerHTML = `
                    <div style="flex-grow: 1;" onclick="openChat('${sid}')">
                        <h5 class="fw-bold mb-1">${s.name || 'Новий чат'}</h5>
                        <span class="text-secondary small">${new Date(s.updatedAt).toLocaleString()}</span>
                    </div>
                    <div class="chat-actions">
                        <button class="action-btn" onclick="prepareEdit('${sid}', '${s.name}')" data-bs-toggle="modal" data-bs-target="#editModal">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="action-btn btn-delete" onclick="prepareDelete('${sid}')" data-bs-toggle="modal" data-bs-target="#deleteModal">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) { container.innerHTML = 'Помилка завантаження даних'; }
    }

    function openChat(id) {
        localStorage.setItem("sessionId", id);
        window.location.href = "/chat";
    }

    function prepareDelete(id) { currentSessionId = id; }
    function prepareEdit(id, name) { 
        currentSessionId = id; 
        document.getElementById('newChatName').value = name;
    }

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (!currentSessionId) return;
        try {
            const res = await fetch(`/api/sessions/${currentSessionId}`, {
                method: 'DELETE',
                headers: authHeaders(),
            });
            if (res.ok) location.reload();
        } catch (e) { console.error(e); }
    });

    document.getElementById('saveNameBtn').addEventListener('click', async () => {
        const newName = document.getElementById('newChatName').value;
        if (!currentSessionId || !newName) return;
        try {
            const res = await fetch(`/api/sessions/${currentSessionId}/rename`, {
                method: 'PATCH',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ name: newName })
            });
            if (res.ok) location.reload();
        } catch (e) { console.error(e); }
    });

    document.addEventListener("DOMContentLoaded", fetchHistory);
</script>
</body>
</html>
