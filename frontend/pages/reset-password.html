<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скидання пароля | KPI Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            background-color: var(--bg-color) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background-color: var(--sidebar-bg) !important;
            border: 1px solid var(--border-color) !important;
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .form-control {
            background-color: #2b2b2b !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 12px 15px !important;
            border-radius: 12px !important;
            margin-bottom: 5px;
        }

        .form-control::placeholder { color: #888 !important; }

        .form-control:focus {
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 0.25rem rgba(138, 79, 255, 0.25) !important;
        }

        .btn-auth {
            background-color: var(--accent-color) !important;
            color: white !important;
            width: 100%;
            padding: 14px;
            border: none !important;
            border-radius: 12px !important;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background-color: var(--accent-hover) !important;
            transform: translateY(-2px);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .error-feedback {
            color: #ff5f5f;
            font-size: 0.85rem;
            text-align: left;
            margin-bottom: 10px;
            display: none;
        }

        .success-feedback {
            color: #4ade80;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: none;
        }

        .is-invalid { border-color: #ff5f5f !important; }

        .auth-avatar-ring {
            width: 88px;
            height: 88px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            overflow: hidden;
            box-shadow:
                0 0 0 2px rgba(138, 79, 255, 0.88),
                0 0 0 1px rgba(0, 0, 0, 0.35) inset,
                0 10px 28px rgba(0, 0, 0, 0.42);
            background: linear-gradient(145deg, #2a2540 0%, #1a1828 100%);
        }
        .auth-avatar-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 18px;
            color: #888;
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent-color); }

        #invalid-token-view { display: none; }
        #reset-form-view   { display: none; }
        #success-view      { display: none; }
        #loading-view      { display: block; }
    </style>
</head>
<body>
<div class="auth-card">

    <!-- Аватар -->
    <div class="auth-avatar-ring">
        <img src="/static/images/avatar1.png" alt="Avatar">
    </div>

    <!-- Стан: завантаження (перевірка токена) -->
    <div id="loading-view">
        <p style="color:#888;">Перевірка посилання…</p>
    </div>

    <!-- Стан: токен недійсний -->
    <div id="invalid-token-view">
        <h5 style="color:#ff5f5f;margin-bottom:12px;">Посилання недійсне</h5>
        <p style="color:#aaa;font-size:0.9rem;">
            Це посилання прострочено або вже було використано.<br>
            Спробуйте ще раз.
        </p>
        <a href="/auth" class="btn btn-auth mt-3">Назад до входу</a>
    </div>

    <!-- Стан: форма введення нового пароля -->
    <div id="reset-form-view">
        <h5 style="color:var(--text-color,#eee);margin-bottom:6px;">Новий пароль</h5>
        <p style="color:#888;font-size:0.85rem;margin-bottom:20px;">Введіть новий пароль для вашого акаунта.</p>

        <form id="resetForm" novalidate>
            <div class="input-group-container" style="margin-bottom:15px;text-align:left;">
                <input type="password" id="newPassword" class="form-control"
                       placeholder="Новий пароль (мін. 6 символів)" autocomplete="new-password" required>
                <div class="error-feedback" id="passwordError"></div>
            </div>

            <div class="input-group-container" style="margin-bottom:15px;text-align:left;">
                <input type="password" id="confirmPassword" class="form-control"
                       placeholder="Підтвердіть пароль" autocomplete="new-password" required>
                <div class="error-feedback" id="confirmError"></div>
            </div>

            <div class="error-feedback" id="generalError" style="text-align:center;"></div>

            <button type="submit" class="btn btn-auth" id="submitBtn">
                Змінити пароль
            </button>
        </form>
    </div>

    <!-- Стан: успіх -->
    <div id="success-view">
        <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
        <h5 style="color:#4ade80;margin-bottom:10px;">Пароль змінено!</h5>
        <p style="color:#aaa;font-size:0.9rem;margin-bottom:20px;">
            Тепер ви можете увійти з новим паролем.
        </p>
        <a href="/auth" class="btn btn-auth">Увійти</a>
    </div>

    <a href="/auth" class="back-link" id="backLink">
        <i class="bi bi-arrow-left"></i> Назад до входу
    </a>
</div>

<script>
(function () {
    const params   = new URLSearchParams(window.location.search);
    const token    = params.get("token") || "";

    const loadingView  = document.getElementById("loading-view");
    const invalidView  = document.getElementById("invalid-token-view");
    const formView     = document.getElementById("reset-form-view");
    const successView  = document.getElementById("success-view");
    const backLink     = document.getElementById("backLink");

    function showView(name) {
        loadingView.style.display  = name === "loading"  ? "block" : "none";
        invalidView.style.display  = name === "invalid"  ? "block" : "none";
        formView.style.display     = name === "form"     ? "block" : "none";
        successView.style.display  = name === "success"  ? "block" : "none";
        backLink.style.display     = name === "success"  ? "none"  : "inline-block";
    }

    // Базова перевірка токена на клієнті (JWT без верифікації підпису — лише перевіряємо exp)
    function tokenSeemsFresh(t) {
        try {
            const parts = t.split(".");
            if (parts.length !== 3) return false;
            const payload = JSON.parse(atob(parts[1].replace(/-/g, "+").replace(/_/g, "/")));
            if (payload.purpose !== "password_reset") return false;
            if (payload.exp && payload.exp * 1000 < Date.now()) return false;
            return true;
        } catch { return false; }
    }

    if (!token || !tokenSeemsFresh(token)) {
        showView("invalid");
    } else {
        showView("form");
    }

    // --- Форма ---
    const form            = document.getElementById("resetForm");
    const newPasswordEl   = document.getElementById("newPassword");
    const confirmEl       = document.getElementById("confirmPassword");
    const passwordError   = document.getElementById("passwordError");
    const confirmError    = document.getElementById("confirmError");
    const generalError    = document.getElementById("generalError");
    const submitBtn       = document.getElementById("submitBtn");

    function showError(el, msg) {
        el.textContent = msg;
        el.style.display = "block";
    }
    function hideError(el) {
        el.textContent = "";
        el.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        hideError(passwordError);
        hideError(confirmError);
        hideError(generalError);
        newPasswordEl.classList.remove("is-invalid");
        confirmEl.classList.remove("is-invalid");

        const pw  = newPasswordEl.value.trim();
        const pw2 = confirmEl.value.trim();
        let valid = true;

        if (pw.length < 6) {
            newPasswordEl.classList.add("is-invalid");
            showError(passwordError, "Пароль має бути не менше 6 символів.");
            valid = false;
        }
        if (pw !== pw2) {
            confirmEl.classList.add("is-invalid");
            showError(confirmError, "Паролі не збігаються.");
            valid = false;
        }
        if (!valid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = "Збереження…";

        try {
            const resp = await fetch("/api/users/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, new_password: pw }),
            });
            const data = await resp.json();
            if (resp.ok) {
                showView("success");
            } else {
                showError(generalError, data.detail || "Помилка. Спробуйте ще раз.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Змінити пароль";
            }
        } catch {
            showError(generalError, "Помилка мережі. Перевірте з'єднання.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Змінити пароль";
        }
    });
})();
</script>
</body>
</html>
