<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайти КПІ | KPI Assistant</title>
    <!-- Ця сторінка публічна, тому редиректу немає -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css?v=9">
</head>
<body data-theme="dark">

<!-- 1. САЙДБАР -->
<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
            <span class="fw-bold">KPI Helper</span>
        </div>
    </div>

    <div class="px-3">
        <!-- Уніфікована кнопка Новий чат -->
        <button id="new-chat-btn" class="btn btn-new-chat">+ Новий чат</button>
        
        <div class="d-flex flex-column">
            <a href="/chat" class="nav-link-custom"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom active"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>

    <div class="sidebar-footer mt-auto border-top border-secondary">
        <a href="/auth" class="sidebar-login-row" id="sidebar-login-row">Увійти</a>
        <div class="sidebar-account-wrap" id="sidebar-account-wrap" hidden>
            <button
                type="button"
                class="sidebar-account-btn"
                id="sidebar-account-btn"
                aria-expanded="false"
                aria-haspopup="true"
                aria-controls="sidebar-account-dropdown"
            >
                <span class="sidebar-account-avatar-wrap">
                    <img
                        id="sidebar-user-photo"
                        class="sidebar-user-photo"
                        alt=""
                        width="40"
                        height="40"
                        hidden
                        decoding="async"
                        referrerpolicy="no-referrer"
                    >
                    <span id="sidebar-user-avatar" class="sidebar-user-avatar" aria-hidden="true">?</span>
                </span>
                <span class="sidebar-account-text">
                    <span class="sidebar-user-name" id="sidebar-user-name">—</span>
                    <span class="sidebar-user-email" id="sidebar-user-email">—</span>
                </span>
                <i class="bi bi-chevron-up sidebar-account-chevron" aria-hidden="true"></i>
            </button>
            <div id="sidebar-account-dropdown" class="sidebar-account-dropdown" role="menu" hidden>
                <div class="sidebar-account-theme-slot" id="sidebar-theme-slot">
                    <button
                        type="button"
                        class="sidebar-account-main-row"
                        id="sidebar-theme-menu-trigger"
                        aria-expanded="false"
                        aria-haspopup="true"
                        aria-controls="sidebar-theme-flyout"
                    >
                        <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-circle-half"></i></span>
                        <span class="sidebar-account-main-label">Тема</span>
                        <i class="bi bi-chevron-right sidebar-account-main-chevron" aria-hidden="true"></i>
                    </button>
                    <div id="sidebar-theme-flyout" class="sidebar-account-theme-flyout" role="menu" hidden>
                        <div class="sidebar-account-dropdown-heading">Тема</div>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="light">
                            <i class="bi bi-sun-fill" aria-hidden="true"></i> Світла
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="dark">
                            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i> Темна
                        </button>
                        <button type="button" class="sidebar-account-theme-btn" role="menuitem" data-theme-pref="system">
                            <i class="bi bi-display" aria-hidden="true"></i> Як у системі
                        </button>
                    </div>
                </div>
                <button type="button" class="sidebar-account-main-row" id="sidebar-dropdown-logout" role="menuitem">
                    <span class="sidebar-account-main-icon" aria-hidden="true"><i class="bi bi-box-arrow-right"></i></span>
                    <span class="sidebar-account-main-label">Вийти</span>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- 2. ОСНОВНИЙ КОНТЕНТ -->
<main class="sites-container-fixed" id="main-content">
    <header class="content-header">
        <button id="sidebar-toggle" class="btn text-secondary me-3">
            <i class="bi bi-layout-sidebar"></i>
        </button>
        <span class="fw-bold">Корисні ресурси</span>
    </header>
    
    <div class="scroll-content">
        <h1 class="fw-bold mb-5">Корисні ресурси КПІ</h1>
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="sitesGrid">
            <!-- Сюди завантажуються картки -->
            <div class="text-center w-100 mt-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
        <div id="noSites" class="text-center text-secondary mt-5" style="display: none;">
            Ресурсів не знайдено
        </div>
    </div>
</main>

<!-- МОДАЛКА ВИХОДУ -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-secondary">
          <h5 class="modal-title">Підтвердження</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Ви впевнені, що хочете вийти з акаунту?</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button type="button" class="btn btn-danger px-4" id="confirmLogout">Вийти</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/chat.js?v=9"></script>
<script>
    async function loadLinks() {
        const grid = document.getElementById("sitesGrid");
        try {
            const res = await fetch("/api/links");
            const links = await res.json();
            grid.innerHTML = "";
            
            if (!links || links.length === 0) {
                document.getElementById('noSites').style.display = 'block';
                return;
            }

            links.forEach(link => {
                const col = document.createElement("div");
                col.className = "col";
                col.innerHTML = `
                    <div class="site-card">
                        <div>
                            <div class="site-icon"><i class="bi bi-browser-chrome"></i></div>
                            <h5 class="fw-bold">${link.title}</h5>
                            <p class="text-secondary small">${link.description || "Ресурс для студентів та викладачів."}</p>
                        </div>
                        <a href="${link.url}" target="_blank" class="btn btn-primary fw-bold" 
                           style="background-color: var(--accent-color); border:none; padding: 12px; border-radius: 10px;">
                           Відвідати <i class="bi bi-box-arrow-up-right ms-1"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(col);
            });
        } catch (e) {
            grid.innerHTML = "<p class='text-center w-100 text-danger'>Помилка завантаження даних.</p>";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const user = localStorage.getItem("user");
        const newChatBtn = document.getElementById("new-chat-btn");
        if (!user) {
            if (newChatBtn) newChatBtn.style.display = "none";
        } else if (newChatBtn) {
            newChatBtn.style.display = "flex";
        }
        loadLinks();
    });
</script>
</body>
</html>
